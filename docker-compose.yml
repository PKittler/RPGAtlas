services:
  db:
    image: postgres:16
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rpgatlas}
      POSTGRES_USER: ${POSTGRES_USER:-rpgatlas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rpgatlas_password}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rpgatlas}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  tileserver:
    image: maptiler/tileserver-gl:latest
    restart: always
    volumes:
      - tiles_data:/data
    expose:
      - "8080"

  web:
    build: .
    restart: always
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
      - tiles_data:/tileserver_data
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8000"

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_data:/app/staticfiles:ro
      - media_data:/app/media:ro
    depends_on:
      - web
      - tileserver

volumes:
  postgres_data:
  redis_data:
  tiles_data:
  media_data:
  static_data:
