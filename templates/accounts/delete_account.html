{% extends 'base.html' %}

{% block title %}Account löschen – RPG Atlas{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
    <div class="card card-body">
        <h1 class="text-2xl font-bold text-red-600 dark:text-red-400 mb-2">Account löschen</h1>
        <p class="text-sm text-gray-600 dark:text-gray-400 mb-6">
            Diese Aktion ist unwiderruflich. Deine personenbezogenen Daten (Benutzername, E-Mail)
            werden gemäß DSGVO anonymisiert.
        </p>

        <form method="post" novalidate>
            {% csrf_token %}
            <div class="mb-6">
                <label for="password" class="form-label">Passwort zur Bestätigung</label>
                <input type="password"
                       name="password"
                       id="password"
                       class="form-input"
                       autocomplete="current-password"
                       autofocus>
            </div>
            <div class="flex gap-3">
                <button type="submit" class="btn-danger flex-1">Account endgültig löschen</button>
                <a href="{% url 'accounts:profile' %}" class="btn-secondary flex-1 text-center">Abbrechen</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
