{# HTMX-Partial: Trigger-Popup-Modal #}
{% with trigger=element.trigger %}
<div>
    <div class="text-gray-200 leading-relaxed mb-5 text-sm">
        {{ trigger.description_text|linebreaksbr }}
    </div>

    {% if active_session %}
    <div class="flex gap-2 flex-wrap">
        <button hx-post="{% url 'maps:element_action' element.pk %}"
                hx-vals='{"action": "activate"}'
                hx-trigger="click"
                hx-swap="none"
                class="btn-primary flex-1">
            Aktivieren
        </button>
        <button id="btn-close-element-popup-modal" class="btn-secondary flex-1">
            Ignorieren
        </button>
    </div>
    {% endif %}

    {% if is_owner and element.is_conditional %}
    <p class="text-xs text-amber-500 mt-3">Bedingt sichtbar (nur für dich als Eigentümer sichtbar)</p>
    {% endif %}
</div>
{% endwith %}
