{% extends 'base.html' %}
{% block title %}Figur löschen – RPG Atlas{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto px-4 py-8">
    <div class="card">
        <div class="card-body text-center py-8">
            <div class="w-16 h-16 rounded-full mx-auto mb-4 flex items-center justify-center text-2xl font-bold text-white"
                 style="background-color: {{ char.color }};">
                {{ char.name|first|upper }}
            </div>
            <h1 class="text-xl font-bold mb-2">Figur löschen?</h1>
            <p class="text-gray-400 mb-6">
                „{{ char.name }}" wird unwiderruflich gelöscht.
            </p>
            <form method="post" class="flex gap-3 justify-center">
                {% csrf_token %}
                <button type="submit" class="btn-danger">Ja, löschen</button>
                <a href="{% url 'characters:character_list' %}" class="btn-secondary">Abbrechen</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
